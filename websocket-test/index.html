<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Platform - WebSocket Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        h1 { color: #e94560; margin-bottom: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .status { padding: 10px 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
        .status.connected { background: #16213e; border: 1px solid #0f3460; color: #4ecca3; }
        .status.disconnected { background: #16213e; border: 1px solid #e94560; color: #e94560; }
        .channels { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
        .channel-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid #0f3460; background: #16213e; color: #eee; cursor: pointer; transition: all 0.2s; }
        .channel-btn.active { background: #0f3460; border-color: #4ecca3; color: #4ecca3; }
        .channel-btn:hover { border-color: #e94560; }
        .events-panel { background: #16213e; border-radius: 8px; padding: 15px; min-height: 400px; max-height: 600px; overflow-y: auto; }
        .event-item { background: #0f3460; padding: 12px; border-radius: 6px; margin-bottom: 8px; border-left: 3px solid #4ecca3; }
        .event-item .event-type { color: #e94560; font-weight: bold; font-size: 14px; }
        .event-item .event-time { color: #888; font-size: 12px; }
        .event-item .event-data { color: #ccc; font-size: 13px; margin-top: 5px; font-family: monospace; white-space: pre-wrap; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .controls button { padding: 8px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-clear { background: #e94560; color: white; }
        .btn-test { background: #4ecca3; color: #1a1a2e; }
        .empty { color: #666; text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>HR Platform - Real-Time WebSocket Monitor</h1>

        <div id="status" class="status disconnected">Disconnected</div>

        <div class="channels">
            <button class="channel-btn active" data-channel="country.USA" onclick="toggleChannel(this)">USA Events</button>
            <button class="channel-btn active" data-channel="country.Germany" onclick="toggleChannel(this)">Germany Events</button>
            <button class="channel-btn active" data-channel="checklist.USA" onclick="toggleChannel(this)">USA Checklist</button>
            <button class="channel-btn active" data-channel="checklist.Germany" onclick="toggleChannel(this)">Germany Checklist</button>
        </div>

        <div class="controls">
            <button class="btn-clear" onclick="clearEvents()">Clear Events</button>
            <button class="btn-test" onclick="testConnection()">Test Connection</button>
        </div>

        <div class="events-panel" id="events">
            <div class="empty">Waiting for events... Create or update an employee via the HR Service API to see real-time updates.</div>
        </div>
    </div>

    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script>
        const SOKETI_HOST = window.location.hostname;
        const SOKETI_PORT = 6001;
        const SOKETI_KEY = 'hr-platform-key';

        let pusher = null;
        let subscribedChannels = {};

        function connect() {
            pusher = new Pusher(SOKETI_KEY, {
                wsHost: SOKETI_HOST,
                wsPort: SOKETI_PORT,
                forceTLS: false,
                disableStats: true,
                enabledTransports: ['ws', 'wss'],
                cluster: 'mt1',
            });

            pusher.connection.bind('connected', () => {
                document.getElementById('status').className = 'status connected';
                document.getElementById('status').textContent = 'Connected to Soketi WebSocket Server';
                addEvent('system', 'Connected', { host: SOKETI_HOST, port: SOKETI_PORT });
            });

            pusher.connection.bind('disconnected', () => {
                document.getElementById('status').className = 'status disconnected';
                document.getElementById('status').textContent = 'Disconnected';
            });

            pusher.connection.bind('error', (err) => {
                addEvent('error', 'Connection Error', { message: err.message || 'Unknown error' });
            });

            // Subscribe to default channels
            document.querySelectorAll('.channel-btn.active').forEach(btn => {
                subscribeToChannel(btn.dataset.channel);
            });
        }

        function subscribeToChannel(channelName) {
            if (subscribedChannels[channelName]) return;

            const channel = pusher.subscribe(channelName);
            subscribedChannels[channelName] = channel;

            // Bind to all known events
            ['employee.list.updated', 'checklist.updated', 'employee.updated'].forEach(eventName => {
                channel.bind(eventName, (data) => {
                    addEvent(channelName, eventName, data);
                });
            });

            addEvent('system', `Subscribed to ${channelName}`, {});
        }

        function unsubscribeFromChannel(channelName) {
            if (!subscribedChannels[channelName]) return;

            pusher.unsubscribe(channelName);
            delete subscribedChannels[channelName];
            addEvent('system', `Unsubscribed from ${channelName}`, {});
        }

        function toggleChannel(btn) {
            const channel = btn.dataset.channel;
            btn.classList.toggle('active');

            if (btn.classList.contains('active')) {
                subscribeToChannel(channel);
            } else {
                unsubscribeFromChannel(channel);
            }
        }

        function addEvent(channel, eventName, data) {
            const panel = document.getElementById('events');
            const empty = panel.querySelector('.empty');
            if (empty) empty.remove();

            const item = document.createElement('div');
            item.className = 'event-item';
            item.innerHTML = `
                <div class="event-type">${eventName}</div>
                <div class="event-time">${new Date().toLocaleTimeString()} | Channel: ${channel}</div>
                <div class="event-data">${JSON.stringify(data, null, 2)}</div>
            `;

            panel.insertBefore(item, panel.firstChild);
        }

        function clearEvents() {
            document.getElementById('events').innerHTML = '<div class="empty">Events cleared. Waiting for new events...</div>';
        }

        function testConnection() {
            if (pusher && pusher.connection.state === 'connected') {
                addEvent('system', 'Connection Test', { status: 'OK', state: pusher.connection.state });
            } else {
                addEvent('system', 'Connection Test', { status: 'FAILED', state: pusher?.connection?.state || 'null' });
            }
        }

        // Auto-connect on page load
        connect();
    </script>
</body>
</html>
